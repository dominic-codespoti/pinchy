name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_INSTALL: 1

permissions:
  contents: write

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --no-default-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --no-default-features --lib

  auto-tag:
    name: Auto-increment version tag
    runs-on: ubuntu-latest
    needs: [check, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(release)')
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tagged: ${{ steps.bump.outputs.tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version and tag
        id: bump
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"

          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${NEW_VERSION} already exists, skipping."
            echo "tagged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sed -i "0,/^version = \"${CURRENT}\"/s//version = \"${NEW_VERSION}\"/" Cargo.toml
          echo "Updated Cargo.toml to ${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore(release): bump version to v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tagged=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test, auto-tag]
    if: always() && needs.test.result == 'success' && (needs.auto-tag.result == 'success' || needs.auto-tag.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tagged == 'true' && format('v{0}', needs.auto-tag.outputs.new_version) || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --no-default-features --features vendored-openssl --target ${{ matrix.target }}

      - name: Build release (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --no-default-features --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinchy-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pinchy

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, auto-tag]
    if: always() && needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || needs.auto-tag.outputs.tagged == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          mkdir -p dist
          for dir in artifacts/pinchy-*; do
            target=$(basename "$dir" | sed 's/pinchy-//')
            chmod +x "$dir/pinchy"
            tar czf "dist/pinchy-${target}.tar.gz" -C "$dir" pinchy
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tagged == 'true' && format('v{0}', needs.auto-tag.outputs.new_version) || github.ref_name }}
          generate_release_notes: true
          files: dist/*

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, check, auto-tag]
    if: always() && needs.test.result == 'success' && needs.check.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || needs.auto-tag.outputs.tagged == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tagged == 'true' && format('v{0}', needs.auto-tag.outputs.new_version) || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --no-default-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PLAYWRIGHT_SKIP_INSTALL: "1"
